<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Accès interdit | Cloé Laurin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playlist+Script&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple: #A896C5;
            --pink: #E8A09D;
            --green: #9EBE8B;
            --coral: #E89B95;
            --yellow: #F4EED7;
            --cream: #FBF9F3;
            --beige: #F8F6F0;
            --black: #2C2C2C;
            --gray: #6B6B6B;
            --white: #FFFFFF;
            --font-script: 'Playlist Script', cursive;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--beige);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        ::selection {
            background: var(--coral);
            color: var(--white);
        }

        /* Badges flottants */
        .badge-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .badge {
            position: absolute;
            padding: 16px 24px;
            font-weight: 700;
            font-size: 16px;
            color: var(--black);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .badge-star {
            background: var(--coral);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            top: 10%;
            right: 8%;
            width: 120px;
            height: 120px;
            animation-delay: 0s;
        }

        .badge-circle {
            background: var(--yellow);
            border-radius: 50%;
            top: 15%;
            left: 12%;
            width: 100px;
            height: 100px;
            font-size: 40px;
            animation-delay: 1s;
        }

        .badge-burst {
            background: var(--pink);
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%);
            bottom: 15%;
            right: 10%;
            width: 110px;
            height: 110px;
            animation-delay: 2s;
        }

        .badge-rect {
            background: var(--green);
            border-radius: 12px;
            bottom: 20%;
            left: 15%;
            padding: 16px 24px;
            animation-delay: 1.5s;
            letter-spacing: 1px;
            font-size: 13px;
        }

        /* Container principal */
        .error-container {
            text-align: center;
            max-width: 700px;
            position: relative;
            z-index: 2;
        }

        .error-code {
            font-size: 180px;
            font-weight: 800;
            line-height: 0.9;
            font-family: var(--font-sans);
            margin-bottom: 24px;
            letter-spacing: -8px;
            position: relative;
            display: inline-block;
        }

        .code-4 {
            color: var(--coral);
        }

        .code-0 {
            font-family: var(--font-script);
            font-size: 220px;
            color: var(--pink);
            font-weight: 400;
            position: relative;
            display: inline-block;
            animation: wiggle 3s ease-in-out infinite;
        }

        .code-3 {
            color: var(--coral);
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 16px;
        }

        h1 .title-script {
            font-family: var(--font-script);
            font-size: 56px;
            color: var(--coral);
        }

        p {
            font-size: 19px;
            color: var(--gray);
            margin-bottom: 48px;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 24px;
            display: inline-block;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .btn-home {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--coral) 0%, var(--pink) 100%);
            color: var(--white);
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(232, 160, 157, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-home::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: 0.5s;
        }

        .btn-home:hover::before {
            left: 100%;
        }

        .btn-home:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(232, 160, 157, 0.5);
        }

        .sparkle {
            position: absolute;
            font-size: 32px;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .sparkle-1 {
            top: 20%;
            right: 15%;
            animation-delay: 0s;
        }

        .sparkle-2 {
            top: 30%;
            left: 10%;
            animation-delay: 1s;
        }

        .sparkle-3 {
            bottom: 25%;
            right: 20%;
            animation-delay: 0.5s;
        }

        /* Lock animation */
        .lock-container {
            position: relative;
            display: inline-block;
        }

        @keyframes lockShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 100px;
                letter-spacing: -4px;
            }

            .code-0 {
                font-size: 120px;
            }

            h1 {
                font-size: 32px;
            }

            h1 .title-script {
                font-size: 40px;
            }

            p {
                font-size: 17px;
            }

            .error-icon {
                font-size: 60px;
            }

            .badge {
                font-size: 12px;
                padding: 12px 16px;
            }

            .badge-star,
            .badge-burst {
                width: 80px;
                height: 80px;
            }

            .badge-circle {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }

            .badge-rect {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Badges flottants -->
    <div class="badge-container">
        <div class="badge badge-star">403</div>
        <div class="badge badge-circle">🚫</div>
        <div class="badge badge-burst">Stop!</div>
        <div class="badge badge-rect">Accès interdit</div>
    </div>

    <!-- Sparkles -->
    <span class="sparkle sparkle-1">🔒</span>
    <span class="sparkle sparkle-2">🔐</span>
    <span class="sparkle sparkle-3">🔑</span>

    <!-- Contenu principal -->
    <div class="error-container">
        <div class="error-icon lock-container">🔒</div>
        <div class="error-code">
            <span class="code-4">4</span><span class="code-0">0</span><span class="code-3">3</span>
        </div>
        <h1>
            <span class="title-script">Désolée,</span> accès interdit
        </h1>
        <p>Vous n'avez pas les autorisations nécessaires pour accéder à cette ressource. Si vous pensez qu'il s'agit d'une erreur, n'hésitez pas à me contacter !</p>
        <a href="index.html" class="btn-home">Retour à l'accueil</a>
    </div>
</body>
</html>
